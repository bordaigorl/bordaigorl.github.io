services:
  jekyll:
    build: .
    volumes:
      - .:/srv/jekyll:cached
      - bundle_cache:/usr/local/bundle
    ports:
      - "4000:4000"
    command: bundle exec jekyll serve --force_polling --host 0.0.0.0
    environment:
      JEKYLL_UID: 1000
      JEKYLL_GID: 1000
      BUNDLE_PATH: /usr/local/bundle

volumes:
  bundle_cache:
